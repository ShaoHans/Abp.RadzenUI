# 发布新的 nuget 包

name: publish-nuget
run-name: ${{ github.actor }} is publishing a nuget package 🚀

env:
  PACKAGE_PROJECTS: |
    ./src/Abp.RadzenUI.Domain.Shared/Abp.RadzenUI.Domain.Shared.csproj
    ./src/Abp.RadzenUI.Domain/Abp.RadzenUI.Domain.csproj
    ./src/Abp.RadzenUI.Application.Contracts/Abp.RadzenUI.Application.Contracts.csproj
    ./src/Abp.RadzenUI.Application/Abp.RadzenUI.Application.csproj
    ./src/Abp.RadzenUI.EntityFrameworkCore/Abp.RadzenUI.EntityFrameworkCore.csproj
    ./src/Abp.RadzenUI.LinkAccounts/Abp.RadzenUI.LinkAccounts.csproj
    ./src/Abp.Blazor.Server.RadzenUI/Abp.Blazor.Server.RadzenUI.csproj

on:
  push:
    tags:
      - 'v*'

jobs:
  publish-nuget-packages:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      name: Checkout code
    - name: Set package version
      run: echo "PACKAGE_VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x
    - name: Restore package projects
      shell: bash
      run: |
        while IFS= read -r project; do
          [ -z "$project" ] && continue
          echo "Restoring $project"
          dotnet restore "$project"
        done <<< "$PACKAGE_PROJECTS"
    - name: Build package projects
      shell: bash
      run: |
        while IFS= read -r project; do
          [ -z "$project" ] && continue
          echo "Building $project"
          dotnet build --no-restore -c Release "$project"
        done <<< "$PACKAGE_PROJECTS"
    - name: Create NuGet packages
      shell: bash
      run: |
        while IFS= read -r project; do
          [ -z "$project" ] && continue
          echo "Packing $project"
          dotnet pack --no-build -c Release "$project" -p:Version=$PACKAGE_VERSION -o ./artifacts
        done <<< "$PACKAGE_PROJECTS"
    - name: Add nuget source
      run: dotnet nuget add source --username ShaoHans --password ${{ secrets.NUGET_TOKEN }} --store-password-in-clear-text --name github "https://nuget.pkg.github.com/ShaoHans/index.json"
    - name: Publish the package to Github Packages
      run: dotnet nuget push ./artifacts/*.nupkg --api-key ${{ secrets.NUGET_TOKEN }} --source github --skip-duplicate
    - name: Publish the package to Nuget Gallery
      run: dotnet nuget push ./artifacts/*.nupkg --api-key ${{ secrets.NUGET_GALLERY_TOKEN }}  --source nuget.org --skip-duplicate
